<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toxic Shop</title>
    <!-- Gözellik üçin Font we Ikonlar goşýarys -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00ff66; /* Neon Ýaşyl */
            --primary-glow: rgba(0, 255, 102, 0.3);
            --accent: #ff0055;  /* Neon Gyrmyzy */
            --bg-dark: #0b0f19; /* Çuňňur Gara-Gök fon */
            --card-bg: #151c2c; /* Kartlaryň fony */
            --text-main: #ffffff;
            --text-muted: #8fa0be;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px; /* Telefonyň ekranyna kämil uýgunlaşma */
            background: rgba(21, 28, 44, 0.6);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* Başlyk Dizaýny */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        h1 span {
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* Menu Düwmeleri */
        .tab-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            background: #1e2638;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            padding: 12px;
            border-radius: 12px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #00ff66 0%, #00bc4b 100%);
            color: #000;
            box-shadow: 0 0 15px var(--primary-glow);
            border: none;
        }

        /* Input Dizaýnlary */
        .form-group {
            position: relative;
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1.1rem;
        }

        .form-control {
            width: 100%;
            background: #111622;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 14px 14px 45px;
            border-radius: 14px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.15);
            background: #141b2a;
        }

        /* Bahalar we Kartlar */
        .uc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .uc-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .uc-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,255,102,0.05) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .uc-card:hover, .uc-card.selected {
            border-color: var(--primary);
            background: #192235;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .uc-card.selected::before {
            opacity: 1;
        }

        .uc-amount {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .uc-amount i {
            color: #ffcc00;
            font-size: 1.1rem;
        }

        .uc-price {
            color: var(--primary);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Esasy Düwme */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #00ff66 0%, #00bc4b 100%);
            border: none;
            color: #000;
            padding: 16px;
            border-radius: 16px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0, 255, 102, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 102, 0.4);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo / Başlyk -->
        <h1>Toxic <span>Shop</span></h1>
        <p class="subtitle">Ynamly, Çalt we Amatly Hyzmat</p>

        <!-- Menu Arasy -->
        <div class="tab-menu">
            <button class="tab-btn active"><i class="flash-icon fa-solid fa-bolt"></i> UC SATYN AL</button>
            <button class="tab-btn"><i class="fa-solid fa-fire"></i> AKKAUNTLAR</button>
        </div>

        <!-- Form Bölümi -->
        <div class="form-group">
            <label>PUBG Mobile ID-ňiz</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-id-card"></i>
                <input type="number" class="form-control" placeholder="Mysal üçin: 5123456789">
            </div>
        </div>

        <div class="form-group">
            <label>Habarlaşmak Üçin (Imo / Telegram)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-phone"></i>
                <input type="text" class="form-control" placeholder="+993 61 234567">
            </div>
        </div>

        <!-- UC Bahalary Grid -->
        <div class="uc-grid">
            <div class="uc-card selected">
                <div class="uc-amount"><i class="fa-solid fa-coins"></i> 60</div>
                <div class="uc-price">23 TMT</div>
            </div>
            <div class="uc-card">
                <div class="uc-amount"><i class="fa-solid fa-coins"></i> 325</div>
                <div class="uc-price">105 TMT</div>
            </div>
            <div class="uc-card">
                <div class="uc-amount"><i class="fa-solid fa-coins"></i> 660</div>
                <div class="uc-price">210 TMT</div>
            </div>
            <div class="uc-card">
                <div class="uc-amount"><i class="fa-solid fa-coins"></i> 1800</div>
                <div class="uc-price">530 TMT</div>
            </div>
        </div>

        <!-- Sargyt Düwmesi -->
        <button class="btn-submit">
            Sargyt Et <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

    <script>
        // Kartlary basylanda saýlanýan etmek üçin aňsat dizaýn kody
        const cards = document.querySelectorAll('.uc-card');
        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
            });
        });
    </script>

</body>
</html>
