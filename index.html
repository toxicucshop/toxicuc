<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toxic Shop</title>
    <style>
        body { background: #060913; color: white; font-family: sans-serif; margin: 0; }
        
        /* GIRIŞ BÖLEGI */
        #login-part { padding: 50px 20px; text-align: center; }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; background: #111827; color: white; }
        button { width: 90%; padding: 15px; background: #00ff66; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; color: black; }
        
        /* DÜKAN BÖLEGI */
        #shop-part { display: none; padding: 20px; }
        .profile-bar { background: #111827; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .uc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .uc-card { background: #111827; padding: 20px; border-radius: 15px; text-align: center; border: 2px solid #222; }
        .uc-price { color: #ffcc00; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- GIRIŞ BÖLEGI -->
    <div id="login-part">
        <h1>Toxic Shop</h1>
        <input type="text" id="username" placeholder="Adyňyz...">
        <input type="text" id="userphone" value="+993">
        <br>
        <button onclick="girisEt()">Giriş et</button>
    </div>

    <!-- DÜKAN BÖLEGI -->
    <div id="shop-part">
        <div class="profile-bar">
            <div>
                <b id="profil-adi"></b><br>
                <small id="profil-nomery"></small>
            </div>
            <button onclick="cykysEt()" style="width: auto; background: #ff4444; color: white; padding: 5px 10px; font-size: 12px;">Çykyş</button>
        </div>

        <h1>UC Paketleri</h1>
        <div class="uc-grid">
            <div class="uc-card">
                <div>60 UC</div>
                <div class="uc-price">23 TMT</div>
            </div>
            <div class="uc-card">
                <div>325 UC</div>
                <div class="uc-price">105 TMT</div>
            </div>
        </div>
    </div>

    <script>
        // Sahypa açylanda barlamak
        if (localStorage.getItem("isLoggedIn")) {
            document.getElementById('login-part').style.display = 'none';
            document.getElementById('shop-part').style.display = 'block';
            
            // Profili görkezmek
            document.getElementById('profil-adi').innerText = localStorage.getItem("userName");
            document.getElementById('profil-nomery').innerText = localStorage.getItem("userPhone");
        }

        // Giriş funksiýasy
        function girisEt() {
            var name = document.getElementById('username').value;
            var phone = document.getElementById('userphone').value;
            
            if (name.length > 0 && phone.startsWith("+993")) {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("userName", name);
                localStorage.setItem("userPhone", phone);
                location.reload(); // Täzele
            } else {
                alert("Maglumatlary dogry ýazyň (+993 bilen başlamaly)!");
            }
        }

        // Çykyş funksiýasy
        function cykysEt() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
