<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toxic UC & Account Shop</title>
    <style>
        :root { --primary: #00ff66; --dark-bg: #060913; --card-bg: #111827; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text); padding: 10px; }
        
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--dark-bg); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: var(--card-bg); padding: 30px; border-radius: 20px;
            width: 100%; max-width: 400px; text-align: center; border: 1px solid #1f2937;
        }
        input {
            width: 100%; padding: 15px; margin: 10px 0; background: #000;
            border: 1px solid #374151; border-radius: 10px; color: white;
        }
        .btn-login {
            width: 100%; padding: 15px; background: var(--primary);
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
        }
        .container { display: none; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>TOXIC SHOP</h2>
        <p>Saýta girmek üçin maglumatlaryňyzy ýazyň</p>
        <input type="text" id="login-name" placeholder="Adyňyz ýa-da Telegram Nikňiz">
        <input type="text" id="login-phone" value="+993" oninput="if(!this.value.startsWith('+993')) this.value='+993'">
        <button class="btn-login" onclick="forceLogin()">GIRIŞ ET</button>
    </div>
</div>

<div class="container" id="main-site" style="display: block;">
    <h1>Saýt işledi!</h1>
    <p>Siz indi Toxic Shop-a girdiňiz.</p>
</div>

<script>
    function forceLogin() {
        const name = document.getElementById('login-name').value;
        const phone = document.getElementById('login-phone').value;

        // Barlagy aýyrdym, göni işledýärin
        localStorage.setItem('toxic_user_name', name);
        localStorage.setItem('toxic_user_phone', phone);
        
        // Ekrany açýar
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-site').style.display = 'block';
        alert("Giriş üstünlikli!");
    }

    // Eger öň giren bolsa açyk goý
    window.onload = function() {
        if (localStorage.getItem('toxic_user_name')) {
            document.getElementById('login-overlay').style.display = 'none';
        }
    }
</script>
</body>
</html>
