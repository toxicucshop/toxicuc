<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toxic Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00ff66;
            --primary-glow: rgba(0, 255, 102, 0.3);
            --accent: #ff0055;
            --bg-dark: #0b0f19;
            --card-bg: #151c2c;
            --text-main: #ffffff;
            --text-muted: #8fa0be;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(21, 28, 44, 0.6);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
            margin-bottom: 5px;
            text-align: center;
        }

        h1 span {
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 25px;
            font-weight: 500;
            text-align: center;
        }

        .tab-menu { display: flex; gap: 10px; margin-bottom: 25px; }

        .tab-btn {
            flex: 1; background: #1e2638; border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main); padding: 12px; border-radius: 12px;
            font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #00ff66 0%, #00bc4b 100%);
            color: #000; box-shadow: 0 0 15px var(--primary-glow); border: none;
        }

        .form-group { position: relative; margin-bottom: 18px; text-align: left; }
        .form-group label { display: block; color: var(--text-muted); margin-bottom: 8px; font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1.1rem; }

        .form-control {
            width: 100%; background: #111622; border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 14px 14px 45px; border-radius: 14px; color: #fff;
            font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 600; outline: none; transition: all 0.3s ease;
        }

        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 255, 102, 0.15); background: #141b2a; }

        .uc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }

        .uc-card {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 16px; border-radius: 16px; cursor: pointer; transition: all 0.25s ease; text-align: center; position: relative;
        }

        .uc-card:hover, .uc-card.selected {
            border-color: var(--primary); background: #192235; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .uc-amount {
            font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 800;
            color: #fff; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        .uc-amount i { color: #ffcc00; font-size: 1.1rem; }
        .uc-price { color: var(--primary); font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px; }

        .btn-submit {
            width: 100%; background: linear-gradient(135deg, #00ff66 0%, #00bc4b 100%); border: none;
            color: #000; padding: 16px; border-radius: 16px; font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 800;
            cursor: pointer; transition: all 0.3s ease; box-shadow: 0 6px 20px rgba(0, 255, 102, 0.25);
            display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase;
        }

        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 255, 102, 0.4); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Toxic <span>Shop</span></h1>
        <p class="subtitle">Ynamly, Çalt we Amatly Hyzmat</p>

        <div class="tab-menu">
            <button class="tab-btn active"><i class="fa-solid fa-bolt"></i> UC SATYN AL</button>
            <button class="tab-btn"><i class="fa-solid fa-fire"></i> AKKAUNTLAR</button>
        </div>

        <!-- PUBG ID Sütüni -->
        <div class="form-group">
            <label>PUBG Mobile ID-ňiz</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-id-card"></i>
                <input type="number" id="pubg-id" class="form-control" placeholder="Mysal üçin: 51009055604">
            </div>
        </div>

        <!-- TÄZE: PUBG Nickname Sütüni -->
        <div class="form-group">
            <label>PUBG Oýundaky Adyňyz (Nickname)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user-tag"></i>
                <input type="text" id="pubg-nick" class="form-control" placeholder="Mysal üçin: TOXIC_BOSS">
            </div>
        </div>

        <div class="form-group">
            <label>Habarlaşmak Üçin (Imo / Telegram)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-phone"></i>
                <input type="text" id="user-contact" class="form-control" placeholder="Mysal üçin: +993 61 234567">
            </div>
        </div>

        <!-- UC Paketleri -->
        <div class="uc-grid">
            <div class="uc-card selected" data-uc="60" data-price="23">
                <div class="uc-amount"><i class="fa-solid fa-coins"></i> 60</div>
                <div class="uc-price">23 TMT</div>
            </div>
            <div class="uc-card" data-uc="325" data-price="105">
                <div class="uc-amount"><i class="fa-solid fa-coins"></i> 325</div>
                <div class="uc-price">105 TMT</div>
            </div>
            <div class="uc-card" data-uc="660" data-price="210">
                <div class="uc-amount"><i class="fa-solid fa-coins"></i> 660</div>
                <div class="uc-price">210 TMT</div>
            </div>
            <div class="uc-card" data-uc="1800" data-price="530">
                <div class="uc-amount"><i class="fa-solid fa-coins"></i> 1800</div>
                <div class="uc-price">530 TMT</div>
            </div>
            <div class="uc-card" data-uc="3850" data-price="1000">
                <div class="uc-amount"><i class="fa-solid fa-coins"></i> 3850</div>
                <div class="uc-price">1000 TMT</div>
            </div>
            <div class="uc-card" data-uc="8100" data-price="2000">
                <div class="uc-amount"><i class="fa-solid fa-coins"></i> 8100</div>
                <div class="uc-price">2000 TMT</div>
            </div>
        </div>

        <!-- Sargyt Etmek Düwmesi -->
        <button class="btn-submit" onclick="sendOrder()">
            Sargyt Et <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

    <script>
        const MY_PHONE_NUMBER = '+99361523250'; 

        const cards = document.querySelectorAll('.uc-card');
        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
            });
        });

        function sendOrder() {
            const pubgId = document.getElementById('pubg-id').value.trim();
            const pubgNick = document.getElementById('pubg-nick').value.trim();
            const contact = document.getElementById('user-contact').value.trim();
            const selectedCard = document.querySelector('.uc-card.selected');
            
            // 1. Boş sütünleri barlamak
            if (!pubgId || !pubgNick || !contact) {
                alert('Ýalňyşlyk: Ähli öýjükleri (ID, Nickname we Nomer) doldurmaly!');
                return;
            }

            // 2. ID Uzynlygyny barlamak (4-nji düzgün)
            if (pubgId.length < 8 || pubgId.length > 12) {
                alert('Ýalňyşlyk: PUBG ID-ňiz dogry däl! (8-12 sifr aralygynda bolmaly)');
                return;
            }

            const ucAmount = selectedCard.getAttribute('data-uc');
            const ucPrice = selectedCard.getAttribute('data-price');

            // Täzelenen we has professional SMS dökümi
            const message = `Salam Toxic Shop, men UC satyn aljak!\n\n` +
                            `📦 Paket: ${ucAmount} UC\n` +
                            `💰 Baha: ${ucPrice} TMT\n` +
                            `🆔 PUBG ID: ${pubgId}\n` +
                            `👤 Nickname: ${pubgNick}\n` +
                            `📞 Habarlaşmak: ${contact}`;

            const encodedMessage = encodeURIComponent(message);
            
            // Göni seniň nomeriňe SMS taýýarlaýar
            window.location.href = `sms:${MY_PHONE_NUMBER}?body=${encodedMessage}`;
        }
    </script>
</body>
</html>
