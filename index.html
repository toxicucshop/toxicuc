<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOXIC UC SHOP</title>
    <style>
        /* CSS-leri öz içine göçürdim (VPN gerek däl) */
        :root { --primary: #00ff66; --bg-dark: #0b0f19; --card-bg: #151c2c; }
        body { background-color: var(--bg-dark); color: #fff; font-family: Arial, sans-serif; padding: 20px; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 450px; background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 20px; text-transform: uppercase; }
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: #1e2638; border: none; color: #fff; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: #000; }
        .form-group { margin-bottom: 15px; }
        .form-group label { color: #8fa0be; font-size: 0.8rem; margin-bottom: 5px; display: block; }
        .form-control { width: 100%; padding: 12px; background: #111622; border: 1px solid #333; border-radius: 10px; color: #fff; box-sizing: border-box; }
        .uc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .uc-card { background: #1e2638; padding: 15px; border-radius: 10px; cursor: pointer; text-align: center; border: 2px solid transparent; transition: 0.3s; }
        .uc-card.selected { border-color: var(--primary); background: #1f2a40; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-bottom: 10px; }
        .btn-copy { width: 100%; padding: 12px; background: #1e2638; color: #8fa0be; border: 1px solid #333; border-radius: 10px; cursor: pointer; }
        .contacts-footer { margin-top: 25px; border-top: 1px solid #333; padding-top: 20px; }
        .contact-item { display: flex; justify-content: space-between; padding: 12px; background: #111622; margin-bottom: 10px; border-radius: 10px; text-decoration: none; color: #fff; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>TOXIC SHOP</h1>
    
    <div class="tab-menu">
        <button class="tab-btn active" id="btn-uc" onclick="switchTab('uc')">UC</button>
        <button class="tab-btn" id="btn-sandyk" onclick="switchTab('sandyk')">SANDYK</button>
    </div>

    <div class="form-group">
        <label>PUBG ID</label>
        <input type="number" id="pubg-id" class="form-control" placeholder="ID ýaz">
    </div>
    <div class="form-group">
        <label>Nickname</label>
        <input type="text" id="pubg-nick" class="form-control" placeholder="Adyňyz">
    </div>

    <div id="uc-grid" class="uc-grid">
        <div class="uc-card selected" data-val="60 UC" data-price="23" onclick="select(this)">60 UC<br>23 TMT</div>
        <div class="uc-card" data-val="325 UC" data-price="105" onclick="select(this)">325 UC<br>105 TMT</div>
        <div class="uc-card" data-val="660 UC" data-price="210" onclick="select(this)">660 UC<br>210 TMT</div>
        <div class="uc-card" data-val="1800 UC" data-price="530" onclick="select(this)">1800 UC<br>530 TMT</div>
    </div>
    
    <div id="sandyk-grid" class="uc-grid" style="display:none;">
        <div class="uc-card" data-val="Ag sandyk" data-price="30" onclick="select(this)">Ag<br>30 TMT</div>
        <div class="uc-card" data-val="Material" data-price="80" onclick="select(this)">Material<br>80 TMT</div>
    </div>

    <button class="btn-submit" onclick="sendOrder()">Sargyt Et</button>
    <button class="btn-copy" onclick="copyOrder()">Teksti göçür (Copy)</button>

    <div class="contacts-footer">
        <a href="https://tmstart.me/toxic_pubg" class="contact-item"><span>Start Kanalymyz</span> <span>→</span></a>
        <a href="https://t.me/toxic_pubg_tg" class="contact-item"><span>Telegram Kanalymyz</span> <span>→</span></a>
    </div>
</div>

<script>
    function switchTab(t) {
        document.getElementById('uc-grid').style.display = t === 'uc' ? 'grid' : 'none';
        document.getElementById('sandyk-grid').style.display = t === 'sandyk' ? 'grid' : 'none';
        document.getElementById('btn-uc').className = t === 'uc' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('btn-sandyk').className = t === 'sandyk' ? 'tab-btn active' : 'tab-btn';
    }
    
    function select(el) {
        document.querySelectorAll('.uc-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
    }

    function getMsg() {
        let card = document.querySelector('.uc-card.selected');
        let id = document.getElementById('pubg-id').value;
        let nick = document.getElementById('pubg-nick').value;
        if(!id || !nick) { alert('Maglumatlary doldur!'); return null; }
        return `Sargyt: ${card.dataset.val}\nBaha: ${card.dataset.price} TMT\nID: ${id}\nNick: ${nick}`;
    }

    function sendOrder() {
        let m = getMsg();
        if(m) window.location.href = `sms:+99371523250?body=${encodeURIComponent(m)}`;
    }

    function copyOrder() {
        let m = getMsg();
        if(m) { navigator.clipboard.writeText(m); alert('Göçürildi!'); }
    }
</script>
</body>
</html>
