<style>
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .card { background: #151c2c; padding: 15px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; text-align: center; }
    .card.active { border-color: #00ff66; }
    .btn { background: #00ff66; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
</style>

<!-- Kategoriýalar -->
<div id="uc-cat" class="grid">
    <div class="card active" onclick="select(this)" data-name="60 UC" data-price="23">60 UC - 23 TMT</div>
    <div class="card" onclick="select(this)" data-name="325 UC" data-price="105">325 UC - 105 TMT</div>
</div>

<div id="sandyk-cat" class="grid" style="display:none;">
    <div class="card" onclick="select(this)" data-name="Ag sandyk" data-price="30">Ag sandyk - 30 TMT</div>
    <div class="card" onclick="select(this)" data-name="Material sandyk" data-price="80">Material sandyk - 80 TMT</div>
    <div class="card" onclick="select(this)" data-name="Amblem sandyk" data-price="125">Amblem sandyk - 125 TMT</div>
</div>

<button class="btn" onclick="send()">Sargyt Et</button>

<script>
    function select(el) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }
    function send() {
        let s = document.querySelector('.card.active');
        let msg = `Sargyt: ${s.dataset.name}, Baha: ${s.dataset.price} TMT, ID: ${document.getElementById('pubg-id').value}, Nick: ${document.getElementById('pubg-nick').value}`;
        window.location.href = `sms:+99371523250?body=${encodeURIComponent(msg)}`;
    }
</script>
