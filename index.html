<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toxic Shop - Admin Panel</title>
</head>
<body>

    <header>
        <h1>Toxic Admin Panel</h1>
    </header>

    <section id="sazlamalar">
        <h2>Dükanyň Sazlamalary</h2>
        <form>
            <label for="shop-name">Dükan Ady</label><br>
            <input type="text" id="shop-name" value="Toxic Shop"><br><br>

            <label for="work-hours">Iş Wagty</label><br>
            <input type="text" id="work-hours" value="09:00 - 22:00"><br><br>

            <button type="button">Sazlamalary Sakla</button>
        </form>
    </section>
    <hr>

    <section id="uc-gosmak">
        <h2>Toxic UC Goşmak</h2>
        <form>
            <label for="uc-name">UC Sany (Ady)</label><br>
            <input type="text" id="uc-name" value="60 UC 💎"><br><br>

            <label for="uc-price">Bahasy (TMT)</label><br>
            <input type="number" id="uc-price" value="15"><br><br>

            <button type="button">UC Goş</button>
        </form>

        <h3>Goşulan UC-ler:</h3>
        <ul id="uc-list">
            <li>60uc - 23 TMT <button type="button">Öçür</button></li>
        </ul>
    </section>
    <hr>

    <section id="akkaunt-gosmak">
        <h2>Toxic Akkaunt Goşmak</h2>
        <form>
            <label for="acc-name">Akkaunt Ady / Nomeri</label><br>
            <input type="text" id="acc-name" value="Akkaunt #1 ⚡"><br><br>

            <label for="acc-desc">Akkaunt Barada (Gysgaça we @kanal silkalary)</label><br>
            <textarea id="acc-desc" rows="3"></textarea><br><br>
            
            <button type="button">Akkaunt Goş</button>
        </form>
    </section>

</body>
</html>
