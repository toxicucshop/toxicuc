<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toxic Shop</title>
    <style>
        /* Öňki dizaýnyňyzyň özü! */
        :root { --primary: #00ff66; --accent: #ff0055; --dark-bg: #060913; --text: #ffffff; }
        body { background-color: var(--dark-bg); color: var(--text); padding: 15px; font-family: sans-serif; }
        .container { max-width: 800px; margin: 0 auto; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .nav-btn { flex: 1; padding: 15px; background: rgba(255,255,255,0.05); border: none; color: white; border-radius: 12px; cursor: pointer; }
        .nav-btn.active { background: var(--primary); color: #000; font-weight: bold; }
        .section-panel { display: none; }
        .section-panel.active { display: block; }
        .card { background: #111827; border: 2px solid #1f2937; padding: 20px; border-radius: 16px; margin-bottom: 10px; cursor: pointer; }
        .card.selected { border-color: var(--primary); }
        .btn-order { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 20px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: #000; border: 1px solid #333; border-radius: 10px; color: white; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center; padding: 30px 0;"><h1>TOXIC SHOP</h1></header>

    <div class="nav-tabs">
        <button id="uc-btn" class="nav-btn active" onclick="switchTab('uc-tab', this)">⚡ UC AL</button>
        <button id="acc-btn" class="nav-btn" onclick="switchTab('acc-tab', this)">🔥 AKKAUNTLAR</button>
    </div>

    <input type="number" id="pubgid" placeholder="PUBG ID-ňiz">
    <input type="text" id="tguser" placeholder="Nomeriňiz / @username">

    <div id="uc-tab" class="section-panel active">
        <div id="uc-container"></div>
    </div>

    <div id="acc-tab" class="section-panel">
        <div id="acc-container"></div>
    </div>

    <button class="btn-order" onclick="sendOrder()">SARGYT ET</button>
</div>

<script>
    // --- BU ÝERI ÜÝTGETSEŇ BOLÝAR ---
    const ucData = [
        { name: '60 UC', price: '23 TMT' },
        { name: '325 UC', price: '105 TMT' },
        { name: '660 UC', price: '210 TMT' },
        { name: '1800 UC', price: '500 TMT' }
    ];

    const accData = [
        { name: 'AKK #01 (Lednik)', price: '450 TMT' },
        { name: 'AKK #02 (Faraon)', price: '900 TMT' }
    ];
    // --------------------------------

    let selName = "", selPrice = "";

    function render() {
        document.getElementById('uc-container').innerHTML = ucData.map(i => `<div class="card" onclick="select(this, '${i.name}', '${i.price}')"><h3>${i.name}</h3><p>${i.price}</p></div>`).join('');
        document.getElementById('acc-container').innerHTML = accData.map(i => `<div class="card" onclick="select(this, '${i.name}', '${i.price}')"><h3>${i.name}</h3><p>${i.price}</p></div>`).join('');
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.section-panel').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function select(el, name, price) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selName = name; selPrice = price;
    }

    function sendOrder() {
        let text = `Sargyt: ${selName} | Baha: ${selPrice} | ID: ${document.getElementById('pubgid').value} | Tel: ${document.getElementById('tguser').value}`;
        window.location.href = `https://wa.me/9936xxxxxxx?text=${encodeURIComponent(text)}`;
    }

    render();
</script>
</body>
</html>
