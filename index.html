<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Toxic Shop</title>
    <style>
        body { margin: 0; background: #060913; color: white; font-family: sans-serif; }
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #060913; z-index: 9999; display: flex; 
            align-items: center; justify-content: center;
        }
        .login-box { background: #111827; padding: 30px; border-radius: 15px; text-align: center; width: 80%; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #00ff66; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #main-site { display: none; padding: 20px; }
    </style>
</head>
<body>

    <!-- GIRIŞ PENJIRESİ -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>Toxic Shop</h2>
            <input type="text" id="user-name" placeholder="Adyňyz">
            <input type="text" id="user-phone" value="+993">
            <button onclick="saveUser()">Giriş et</button>
        </div>
    </div>

    <!-- ESASY SAHYPA -->
    <div id="main-site">
        <h1>Hoş geldiňiz!</h1>
        <p id="user-display"></p>
        <button onclick="logout()">Çykyş</button>
    </div>

    <script>
        // Sahypa açylanda barlanýar
        window.onload = function() {
            if(localStorage.getItem('user_name')) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-site').style.display = 'block';
                document.getElementById('user-display').innerText = "Salam, " + localStorage.getItem('user_name');
            }
        };

        function saveUser() {
            let name = document.getElementById('user-name').value;
            if(name.length > 2) {
                localStorage.setItem('user_name', name);
                location.reload(); // Sahypany täzeleýär
            } else {
                alert("Adyňyzy ýazyň!");
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
