<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toxic Shop - Admin Panel</title>
    <style>
        /* Reňkleriň we esasy dizaýnyň sazlamalary */
        :root {
            --bg-color: #0b0f15;
            --card-bg: #141c24;
            --primary-cyan: #00e5ff;
            --primary-blue: #007bff;
            --text-main: #ffffff;
            --text-muted: #5e9b99;
            --border-color: #233e45;
            --danger-red: #ff3b3b;
            --input-bg: #0d1117;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        header h1 {
            color: var(--primary-cyan);
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        section h2 {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        section h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background-color: var(--primary-cyan);
            margin-right: 10px;
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        input[type="text"], input[type="number"], textarea {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--primary-cyan);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            margin-top: 10px;
            background: linear-gradient(to right, var(--primary-cyan), var(--primary-blue));
            color: #000;
            transition: opacity 0.2s ease;
        }

        .btn-submit:active {
            opacity: 0.8;
        }

        .uc-list-container {
            margin-top: 20px;
        }

        ul {
            list-style: none;
        }

        li {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 15px;
        }

        .btn-delete {
            background-color: var(--danger-red);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header>
            <h1>Toxic Admin Panel</h1>
        </header>

        <section id="sazlamalar">
            <h2>Dükanyň Sazlamalary</h2>
            <form id="shop-settings-form">
                <div class="form-group">
                    <label for="shop-name">Dükan Ady</label>
                    <input type="text" id="shop-name" value="Toxic Shop">
                </div>

                <div class="form-group">
                    <label for="work-hours">Iş Wagty</label>
                    <input type="text" id="work-hours" value="09:00 - 22:00">
                </div>

                <button type="button" class="btn-submit" id="btn-save-settings">Sazlamalary Sakla</button>
            </form>
        </section>

        <section id="uc-gosmak">
            <h2>Toxic UC Goşmak</h2>
            <form id="uc-form">
                <div class="form-group">
                    <label for="uc-name">UC Sany (Ady)</label>
                    <input type="text" id="uc-name" placeholder="Mysal: 60 UC 💎">
                </div>

                <div class="form-group">
                    <label for="uc-price">Bahasy (TMT)</label>
                    <input type="number" id="uc-price" placeholder="Mysal: 15">
                </div>

                <button type="button" class="btn-submit" id="btn-add-uc">UC Goş</button>
            </form>

            <div class="uc-list-container">
                <ul id="uc-list">
                    <li>
                        <span>60uc - 23 TMT</span>
                        <button type="button" class="btn-delete">Öçür</button>
                    </li>
                </ul>
            </div>
        </section>

        <section id="akkaunt-gosmak">
            <h2>Toxic Akkaunt Goşmak</h2>
            <form id="account-form">
                <div class="form-group">
                    <label for="acc-name">Akkaunt Ady / Nomeri</label>
                    <input type="text" id="acc-name" placeholder="Mysal: Akkaunt #1 ⚡">
                </div>

                <div class="form-group">
                    <label for="acc-desc">Akkaunt Barada (Gysgaça we @kanal silkalary)</label>
                    <textarea id="acc-desc" rows="3" placeholder="Maglumatlary ýazyň..."></textarea>
                </div>
                
                <button type="button" class="btn-submit" id="btn-add-account">Akkaunt Goş</button>
            </form>
        </section>

    </div>

    <script>
        // 1. Sazlamalary saklamak funksiýasy
        document.getElementById('btn-save-settings').addEventListener('click', function() {
            const shopName = document.getElementById('shop-name').value;
            const workHours = document.getElementById('work-hours').value;
            
            alert(`Sazlamalar ýatda saklandy!\nDükan: ${shopName}\nWagt: ${workHours}`);
        });

        // 2. UC Goşmak funksiýasy
        document.getElementById('btn-add-uc').addEventListener('click', function() {
            const ucNameInput = document.getElementById('uc-name');
            const ucPriceInput = document.getElementById('uc-price');
            
            const ucName = ucNameInput.value.trim();
            const ucPrice = ucPriceInput.value.trim();

            // Meýdançalar boş bolsa goýbermejek bolmaly
            if (ucName === '' || ucPrice === '') {
                alert('Eý ýigit, meýdançalary doldur!');
                return;
            }

            const ucList = document.getElementById('uc-list');

            // Täze li elementi döredýäris
            const li = document.createElement('li');
            li.innerHTML = `
                <span>${ucName} - ${ucPrice} TMT</span>
                <button type="button" class="btn-delete">Öçür</button>
            `;

            // Täze goşulan "Öçür" knopkasyna funksiýa birikdirýäris
            li.querySelector('.btn-delete').addEventListener('click', function() {
                li.remove();
            });

            // Sanawa goşýarys
            ucList.appendChild(li);

            // Inputs arassalaýarys
            ucNameInput.value = '';
            ucPriceInput.value = '';
        });

        // 3. Ilkinji duran nusga elementi öçürmek funksiýasy
        document.querySelectorAll('.btn-delete').forEach(function(button) {
            button.addEventListener('click', function(e) {
                e.target.closest('li').remove();
            });
        });

        // 4. Akkaunt goşmak funksiýasy
        document.getElementById('btn-add-account').addEventListener('click', function() {
            const accName = document.getElementById('acc-name').value;
            if(accName.trim() === '') {
                alert('Akkaunt adyny ýazyň!');
                return;
            }
            alert(`Akkaunt üstünlikli goşuldy: ${accName}`);
            document.getElementById('acc-name').value = '';
            document.getElementById('acc-desc').value = '';
        });
    </script>
</body>
</html>
