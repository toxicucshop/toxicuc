<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toxic Shop</title>
    <style>
        body { background: #060913; color: white; font-family: sans-serif; text-align: center; }
        
        /* Giriş bölegi */
        #login-part { padding: 50px 20px; }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; }
        button { width: 90%; padding: 15px; background: #00ff66; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        /* Dükan bölegi */
        #shop-part { display: none; padding: 20px; }
    </style>
</head>
<body>

    <!-- GIRIŞ BÖLEGI -->
    <div id="login-part">
        <h1>Toxic Shop</h1>
        <input type="text" id="username" placeholder="Adyňyz...">
        <br>
        <button onclick="girisEt()">Giriş et</button>
    </div>

    <!-- DÜKAN BÖLEGI -->
    <div id="shop-part">
        <h1>Hoş geldiňiz!</h1>
        <p id="welcometext"></p>
        <button onclick="cykysEt()" style="background: red;">Çykyş</button>
    </div>

    <script>
        // Sahypa açylanda barlamak
        if (localStorage.getItem("isLoggedIn")) {
            document.getElementById('login-part').style.display = 'none';
            document.getElementById('shop-part').style.display = 'block';
            document.getElementById('welcometext').innerText = "Salam, " + localStorage.getItem("userName");
        }

        // Giriş funksiýasy
        function girisEt() {
            var name = document.getElementById('username').value;
            if (name.length > 0) {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("userName", name);
                
                // Sahypany täzele
                location.reload();
            } else {
                alert("Adyňyzy ýazyň!");
            }
        }

        // Çykyş funksiýasy
        function cykysEt() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
